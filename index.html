<script>
  
/* ================= SCREENSAVER ================= */

let timer, active = false;
const saver = document.getElementById("screensaver");
const logo = document.getElementById("dvdLogo");

let x = 100, y = 100, dx = 2, dy = 2;

function resetTimer() {
  clearTimeout(timer);
  if (active) stopSaver();
  timer = setTimeout(startSaver, 15000);
}

function startSaver() {
  saver.style.display = "block";
  document.body.style.overflow = "hidden";
  active = true;
  animate();
}

function stopSaver() {
  saver.style.display = "none";
  document.body.style.overflow = "";
  active = false;
}

function animate() {
  if (!active) return;

  x += dx;
  y += dy;

  if (x < 0 || x + 150 > innerWidth) dx *= -1;
  if (y < 0 || y + 150 > innerHeight) dy *= -1;

  logo.style.left = x + "px";
  logo.style.top = y + "px";

  requestAnimationFrame(animate);
}

["mousemove", "keydown", "mousedown", "touchstart"].forEach(e => {
  document.addEventListener(e, resetTimer);
});

resetTimer();
</script>
