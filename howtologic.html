<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="how to logic">
<meta property="og:description" content="every how to logic video ever made">
<meta property="og:url" content="https://azwqxr.github.io/howtologic">
<meta property="og:image" content="https://azwqxr.github.io/images/screensaver.png">
<meta name="theme-color" content="#00aa00">

<title>how to logic</title>

<link rel="stylesheet" href="https://unpkg.com/winbox@0.2.82/dist/css/winbox.min.css">

<style>
:root{
    --accent:#00aa00;
    --bg:#c0c0c0;
}

*{
    box-sizing:border-box;
    font-family:"MS Sans Serif",Tahoma,sans-serif;
}

body{
    margin:0;
    background:var(--bg);
    color:#000;
}

/* TOP BAR */

.topbar{
    height:42px;
    background:#808080;
    border-bottom:2px solid #404040;
    display:flex;
    align-items:center;
    padding:0 10px;
}

.company-title{
    color:white;
    font-weight:bold;
}

/* MAIN WINDOW */

.window{
    width:min(900px,95%);
    margin:30px auto;
    background:#c0c0c0;
    border-top:2px solid white;
    border-left:2px solid white;
    border-right:2px solid #404040;
    border-bottom:2px solid #404040;
}

.title-bar{
    background:linear-gradient(
        to right,
        var(--accent),
        #006600
    );
    color:white;
    padding:4px 8px;
    font-weight:bold;
    display:flex;
    justify-content:space-between;
}

.window-body{
    padding:20px;
}

.button95{
    background:#c0c0c0;
    border-top:2px solid white;
    border-left:2px solid white;
    border-right:2px solid #404040;
    border-bottom:2px solid #404040;
    padding:8px 16px;
    cursor:pointer;
    font-weight:bold;
    margin:4px;
}

.button95:active{
    border-top:2px solid #404040;
    border-left:2px solid #404040;
    border-right:2px solid white;
    border-bottom:2px solid white;
}

.footer{
    text-align:center;
    margin:20px;
    color:#444;
}

/* WINBOX CUSTOM THEME */

.winbox.green{
    background:#00aa00 !important;
}

.winbox.green .wb-header{
    background:linear-gradient(
        to right,
        #00aa00,
        #006600
    ) !important;
    color:white !important;
}

.winbox.green .wb-body{
    background:#c0c0c0 !important;
    padding:0 !important;
}

.video-frame{
    width:100%;
    height:100%;
    border:none;
}

/* SCREENSAVER */

#screensaver{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    z-index:999999;
}

#screensaver img{
    position:absolute;
    width:150px;
    user-select:none;
    pointer-events:none;
}
</style>
</head>
<body>

<div class="topbar">
    <div class="company-title">
        azwqxr's hideout - how to logic
    </div>
</div>

<div class="window">

    <div class="title-bar">
        <span>how_to_logic.html</span>
        <span>— □ X</span>
    </div>

    <div class="window-body">

        <button class="button95"
                onclick="openVideo('memory')">
            memory
        </button>

        <button class="button95"
                onclick="openVideo('memory11')">
            memory1.1
        </button>

        <button class="button95"
                onclick="openVideo('rand')">
            rand
        </button>

        <button class="button95"
                onclick="openVideo('demux')">
            demux
        </button>

    </div>

</div>

<div class="footer">
    azwqxr's hideout
</div>

<!-- SCREENSAVER -->

<div id="screensaver">
    <img
        id="dvdLogo"
        src="https://azwqxr.github.io/images/screensaver.png"
        alt="DVD Logo">
</div>

<script src="https://unpkg.com/winbox@0.2.82/dist/winbox.bundle.min.js"></script>

<script>
/* VIDEO DATABASE */

const videos = {

    memory: {
        title: "memory",
        src: "https://www.youtube.com/embed/ggZysIePwVs"
    },

    memory11: {
        title: "memory1.1",
        src: "https://www.youtube.com/embed/t-31yWWF5TE"
    },

    rand: {
        title: "rand",
        src: "https://www.youtube.com/embed/Xue8Gg8bt7Y"
    },

    demux: {
        title: "demux",
        src: "https://www.youtube.com/embed/VEN4AfcamQk"
    }
};

/* OPEN VIDEO WINDOW */

function openVideo(id){

    const video = videos[id];

    if(!video) return;

    new WinBox({
        title: video.title,

        class: ["green"],

        width: "80%",
        height: "70%",

        x: "center",
        y: "center",

        html: `
            <iframe
                class="video-frame"
                src="${video.src}"
                title="${video.title}"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen>
            </iframe>
        `
    });
}

/* SCREENSAVER */

let timer;
let active = false;

const saver = document.getElementById("screensaver");
const logo = document.getElementById("dvdLogo");

let x = 100;
let y = 100;

let dx = 2;
let dy = 2;

function resetTimer(){

    clearTimeout(timer);

    if(active){
        stopSaver();
    }

    timer = setTimeout(startSaver, 15000);
}

function startSaver(){

    saver.style.display = "block";
    document.body.style.overflow = "hidden";

    active = true;

    animate();
}

function stopSaver(){

    saver.style.display = "none";
    document.body.style.overflow = "";

    active = false;
}

function animate(){

    if(!active) return;

    x += dx;
    y += dy;

    if(x < 0 || x + 150 > window.innerWidth){
        dx *= -1;
    }

    if(y < 0 || y + 150 > window.innerHeight){
        dy *= -1;
    }

    logo.style.left = x + "px";
    logo.style.top = y + "px";

    requestAnimationFrame(animate);
}

[
    "mousemove",
    "mousedown",
    "keydown",
    "touchstart"
].forEach(eventName => {

    document.addEventListener(
        eventName,
        resetTimer
    );

});

document.addEventListener("click", () => {
    if(active){
        stopSaver();
    }
});

resetTimer();
</script>

</body>
</html>
