<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>home | crappy flash games</title>

<!-- Loader script -->
<script src="loader.js"></script>

<!-- Ruffle -->
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<link rel="stylesheet" href="./styles.css?v=1">
</head>
<body>

<div class="header">crappy flash games</div>

<!-- Search -->
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search games..." oninput="filterCards()">
</div>

<!-- Recently Played -->
<div class="recently">
  <h2>Recently Played</h2>
  <div id="recentContainer" class="recent-container"></div>
</div>

<div class="container" id="gameContainer">

  <div class="card" data-id="game1" data-title="Game 1" data-subtitle="subtitlehover" onclick="loadFlash('flash/game1.swf','game1','Game 1','media/images/game1.png')">
    <img src="thumbs/game1.png" alt="Game 1">
    <div class="card-title">A</div>
    <div class="card-subtitle">nil</div>
  </div>

  <div class="card" data-id="game2" data-title="Game 2" data-subtitle="subtitlehover" onclick="loadFlash('flash/game2.swf','game2','Game 2','media/images/game2.png')">
    <img src="thumbs/game2.png" alt="Game 2">
    <div class="card-title">B</div>
    <div class="card-subtitle">nil</div>
  </div>

  <div class="card" data-id="game3" data-title="Game 3" data-subtitle="subtitlehover" onclick="loadFlash('flash/game3.swf','game3','Game 3','media/images/game3.png')">
    <img src="thumbs/game3.png" alt="Game 3">
    <div class="card-title">C</div>
    <div class="card-subtitle">nil</div>
  </div>

</div>

<div class="player-container" id="playerContainer">
  <div class="player-box" id="player"></div>
  <button class="close-btn" id="closeBtn" onclick="closePlayer()">Close</button>
</div>

<script>
let player;

function loadFlash(file, id, title, thumb) {
  const container = document.getElementById("playerContainer");
  const playerDiv = document.getElementById("player");
  const closeBtn = document.getElementById("closeBtn");

  playerDiv.innerHTML = "";

  const ruffle = window.RufflePlayer.newest();
  player = ruffle.createPlayer();
  player.style.width = "100%";
  player.style.height = "100%";

  playerDiv.appendChild(player);
  player.load(file);

  container.style.display = "flex";
  closeBtn.style.display = "block";

  saveRecent(id, title, thumb);
  renderRecent();
  stopMusic();   // pause when game opens
}

function closePlayer() {
  document.getElementById("playerContainer").style.display = "none";
  document.getElementById("player").innerHTML = "";
  document.getElementById("closeBtn").style.display = "none";
  resumeMusic(); // resume when game closes
}

// SEARCH FILTER
function filterCards() {
  const input = document.getElementById("searchInput").value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    const title = card.getAttribute("data-title").toLowerCase();
    const subtitle = card.getAttribute("data-subtitle").toLowerCase();

    card.style.display = (title.includes(input) || subtitle.includes(input)) ? "block" : "none";
  });
}

// RECENTLY PLAYED
function saveRecent(id, title, thumb) {
  let recent = JSON.parse(localStorage.getItem("recentGames")) || [];
  recent = recent.filter(g => g.id !== id);
  recent.unshift({ id, title, thumb });
  if (recent.length > 6) recent.pop();
  localStorage.setItem("recentGames", JSON.stringify(recent));
}

function renderRecent() {
  const container = document.getElementById("recentContainer");
  container.innerHTML = "";

  const recent = JSON.parse(localStorage.getItem("recentGames")) || [];

  recent.forEach(game => {
    const div = document.createElement("div");
    div.className = "recent-card";
    div.onclick = () => loadFlash(`flash/${game.id}.swf`, game.id, game.title, game.thumb);

    div.innerHTML = `
      <img src="${game.thumb}" />
      <span>${game.title}</span>
    `;

    container.appendChild(div);
  });
}

renderRecent();
</script>

</body>
</html>
